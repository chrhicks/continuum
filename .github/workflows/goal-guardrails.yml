name: GOAL Guardrails

on:
  pull_request:
  push:

jobs:
  validate-goal-invariants:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Link CLI
        run: bun link

      - name: Typecheck
        run: bun run typecheck

      - name: Run tests
        run: bun run scripts/run-tests-for-validate.ts

      - name: Initialize continuum for smoke tests
        run: |
          continuum init
          continuum memory init

      - name: Verify GOAL invariants
        run: bun run verify:goal
